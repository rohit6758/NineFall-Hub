<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Ninefall Hub — Store</title>
<link rel="stylesheet" href="desktop.css" />
</head>
<body>

<div id="app">

  <!-- ============ SIDEBAR ============ -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="logo">
        <div class="logo-mark">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none"><path d="M12 2L4 9V22L12 17L20 22V9L12 2Z" stroke="white" stroke-width="1.6" stroke-linejoin="round"/></svg>
        </div>
        <div class="logo-text font-display">NINEFALL<br/>HUB</div>
      </div>
    </div>

    <nav class="nav" id="navList">
      <!-- injected by app.js -->
    </nav>

    <div class="sidebar-footer">
      <div class="profile-row">
        <div class="avatar">R<span class="avatar-status pulse-dot"></span></div>
        <div style="flex:1; min-width:0;">
          <div class="profile-name font-mono">R.OHI.7</div>
          <button class="profile-link" data-nav="profile">View profile</button>
        </div>
      </div>
      <button class="logout-btn">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Logout
      </button>
    </div>
  </aside>

  <!-- ============ MAIN COLUMN ============ -->
  <div class="main">

    <!-- TOPBAR -->
    <header class="topbar">
      <div class="search-wrap">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input class="search-input" id="topSearch" placeholder="Search the network..." />
      </div>

      <button class="topbar-btn" id="viewToggleBtn">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
        <span id="viewToggleLabel">Filter &amp; Discover</span>
      </button>
      <button class="topbar-btn">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>
        <span>Best Sellers</span>
      </button>

      <div class="spacer"></div>

      <div class="pro-pill">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M5 16L3 5l5.5 5L12 4l3.5 6L21 5l-2 11H5zm0 2h14v2H5v-2z"/></svg>
        PRO
      </div>
      <button class="icon-btn" aria-label="Notifications">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
        <span class="icon-dot"></span>
      </button>
      <button class="icon-btn" id="savedBtn" data-view="saved" aria-label="Saved">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
        <span class="icon-count pink" id="savedCount" style="display:none;">0</span>
      </button>
      <button class="icon-btn" id="cartBtn" data-view="cart" aria-label="Cart">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
        <span class="icon-count" id="cartCount" style="display:none;">0</span>
      </button>
    </header>

    <!-- PAGE CONTENT -->
    <div class="page" id="pageContent">
      <!-- injected by app.js -->
    </div>
  </div>
</div>

<!-- ASSET DETAIL DRAWER -->
<div class="drawer-overlay" id="drawerOverlay">
  <div class="drawer" id="drawerPanel" onclick="event.stopPropagation()">
    <!-- injected -->
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast">
  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>
  <span id="toastMsg"></span>
</div>

<script src="data.js"></script>
<script src="app.js"></script>
</body>
</html>
